{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block title %}Inbound Integration{% endblock %}

{% block content %}
    <h3>Update Inbound Integration</h3>

    {% if key_form %}
        {% crispy key_form %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group col-lg-6 px-0 list-inline">{{form.errors}}</div>
        {% crispy form %}
   </form>
{% endblock %}
