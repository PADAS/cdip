{% if form.errors %}
<div class="alert alert-danger" role="alert">
    <strong>Please correct the errors below:</strong>
    <ul class="mb-0 mt-1">
    {% for field, errors in form.errors.items %}
        {% for error in errors %}
        <li>{{ field }}: {{ error }}</li>
        {% endfor %}
    {% endfor %}
    </ul>
</div>
{% endif %}
