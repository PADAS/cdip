{% load crispy_forms_tags %}
<div hx-params="not csrfmiddlewaretoken">
<div class="slide-panel-toolbar">
    <span id="delete-btn">
        <button type="button"
                class="btn btn-outline-danger btn-sm"
                _="on click hide #delete-btn then show #delete-confirm with display:flex">Delete</button>
    </span>
    <span id="delete-confirm" class="align-items-center" style="display: none; gap: .4rem;">
        <small class="text-muted">Delete {{ form.instance.name }}?</small>
        <button type="button"
                class="btn btn-danger btn-sm"
                hx-post="{% url 'inbound_integration_configuration_delete' configuration_id=form.instance.id %}"
                hx-swap="none">Confirm</button>
        <button type="button"
                class="btn btn-secondary btn-sm"
                _="on click hide #delete-confirm then show #delete-btn">Cancel</button>
    </span>
    <div>
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="document.body.dispatchEvent(new Event('closePanel'));">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" onclick="this.closest('#slide-panel-body').querySelector('form').dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}));">Save</button>
    </div>
</div>
<div class="slide-panel-content">
    <div id="api-key-section"
         hx-get="{% url 'inbound_api_key_fragment' integration_id=form.instance.id %}"
         hx-trigger="load"
         hx-swap="innerHTML">
        <p class="text-muted">Loading API key...</p>
    </div>

    {% include "integrations/_form_errors.html" %}
    {% crispy form %}

    {% if form.instance.default_devicegroup %}
    <div class="mt-3">
        <a href="#"
           hx-get="{% url 'device_group_update' device_group_id=form.instance.default_devicegroup.id %}"
           hx-target="#slide-panel-body"
           hx-swap="innerHTML"
           class="btn btn-outline-secondary btn-sm">View Device Group</a>
    </div>
    {% endif %}

    <div id="inbound-connections-section"
         hx-get="{% url 'inbound_connections_list' configuration_id=form.instance.id %}"
         hx-trigger="load"
         hx-swap="outerHTML">
        <p class="text-muted">Loading connections...</p>
    </div>
</div>
</div>
